<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CircleSense - Intelligent Scale Practice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38ff14",
                        "background-light": "#f6f8f5",
                        "background-dark": "#0a0f08",
                        "surface": "#161d14",
                        "border-muted": "#274b20",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation & Session Controls -->
<header class="border-b border-border-muted bg-surface/50 backdrop-blur-md px-6 py-3 flex items-center justify-between gap-6">
<div class="flex items-center gap-3">
<div class="text-primary size-6">
<span class="material-symbols-outlined text-3xl">adjust</span>
</div>
<h1 class="text-xl font-bold tracking-tight">CircleSense</h1>
</div>
<div class="flex items-center gap-4 bg-background-dark/50 p-1.5 rounded-lg border border-border-muted">
<button class="p-2 hover:bg-primary/20 rounded-lg transition-colors group">
<span class="material-symbols-outlined text-primary">play_arrow</span>
</button>
<button class="p-2 hover:bg-primary/20 rounded-lg transition-colors">
<span class="material-symbols-outlined">pause</span>
</button>
<button class="p-2 hover:bg-primary/20 rounded-lg transition-colors">
<span class="material-symbols-outlined">stop</span>
</button>
<div class="w-px h-6 bg-border-muted mx-2"></div>
<button class="flex items-center gap-2 px-3 py-1.5 bg-primary text-background-dark rounded-lg font-bold text-sm">
<span class="material-symbols-outlined text-sm">fiber_manual_record</span>
                RECORD
            </button>
</div>
<div class="flex flex-1 max-w-2xl items-center gap-8">
<div class="flex flex-col flex-1 gap-1">
<div class="flex justify-between text-[10px] uppercase tracking-widest text-slate-400 font-bold">
<span>Tempo (BPM)</span>
<span class="text-primary">120</span>
</div>
<input class="w-full h-1.5 bg-border-muted rounded-full appearance-none cursor-pointer accent-primary" max="300" min="60" type="range" value="120"/>
</div>
<div class="flex flex-col gap-1 w-48">
<span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Chord Type</span>
<select class="bg-surface border border-border-muted text-xs rounded-lg px-2 py-1 focus:ring-primary focus:border-primary">
<option>Major 7</option>
<option selected="">Dominant 7</option>
<option>Minor 7</option>
<option>Diminished</option>
</select>
</div>
</div>
<div class="flex items-center gap-3">
<div class="flex bg-surface rounded-lg p-1 border border-border-muted">
<button class="px-3 py-1 text-xs font-bold rounded bg-primary text-background-dark">1 Bar</button>
<button class="px-3 py-1 text-xs font-bold rounded text-slate-400">2 Bars</button>
</div>
<button class="p-2 border border-border-muted rounded-lg text-slate-400">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Workspace -->
<main class="flex-1 flex overflow-hidden">
<!-- Center: Circle Engine -->
<div class="flex-1 relative flex items-center justify-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/5 via-transparent to-transparent">
<!-- Direction Indicators -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 flex gap-4">
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-primary bg-primary/10 text-primary text-xs font-bold">
<span class="material-symbols-outlined text-sm">rotate_right</span> CLOCKWISE
                </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-border-muted bg-surface text-slate-400 text-xs font-bold">
<span class="material-symbols-outlined text-sm">rotate_left</span> COUNTER
                </button>
</div>
<!-- The Circle -->
<div class="relative size-[520px] rounded-full border-[12px] border-surface shadow-[0_0_50px_rgba(56,255,20,0.05)] flex items-center justify-center">
<!-- Circle of Fifths Background Ring (Simplified representation) -->
<div class="absolute inset-0 rounded-full border border-border-muted/30 border-dashed animate-[spin_60s_linear_infinite]"></div>
<!-- Chord Nodes -->
<div class="absolute top-0 -translate-y-1/2 px-4 py-2 bg-surface border border-border-muted rounded-lg font-bold text-slate-400">C</div>
<div class="absolute right-0 translate-x-1/2 px-4 py-2 bg-surface border border-border-muted rounded-lg font-bold text-slate-400">G</div>
<div class="absolute bottom-0 translate-y-1/2 px-4 py-2 bg-surface border border-border-muted rounded-lg font-bold text-slate-400">F</div>
<!-- Highlighted Active Chord -->
<div class="absolute right-[15%] top-[15%] px-6 py-3 bg-primary shadow-[0_0_30px_#38ff14] text-background-dark rounded-xl font-black text-2xl z-10 border-4 border-background-dark">E7</div>
<div class="absolute right-[5%] bottom-[30%] px-4 py-2 bg-primary/20 border border-primary/50 text-primary rounded-lg font-bold opacity-60">A7</div>
<!-- Central HUD -->
<div class="text-center space-y-4">
<div class="text-slate-400 text-xs tracking-[0.2em] font-bold uppercase">Now Playing</div>
<div class="text-7xl font-black text-white tracking-tighter">E7</div>
<div class="flex items-center justify-center gap-3">
<div class="px-3 py-1 bg-surface border border-border-muted rounded text-sm font-mono">BAR 1/2</div>
<div class="size-3 rounded-full bg-primary shadow-[0_0_10px_#38ff14] animate-pulse"></div>
</div>
</div>
</div>
</div>
<!-- Right: Accuracy Dashboard -->
<aside class="w-80 border-l border-border-muted bg-surface/30 p-6 flex flex-col gap-6 overflow-y-auto">
<h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Live Feedback</h3>
<!-- In/Out Indicator -->
<div class="flex flex-col items-center justify-center p-8 rounded-2xl bg-primary/5 border border-primary/20">
<div class="size-24 rounded-full border-8 border-primary flex items-center justify-center shadow-[0_0_20px_rgba(56,255,20,0.2)]">
<span class="text-primary font-black text-xl">IN</span>
</div>
<p class="mt-4 text-xs font-bold text-primary tracking-widest">PERFECT PITCH</p>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-1 gap-3">
<div class="bg-surface border border-border-muted p-4 rounded-xl">
<div class="flex justify-between items-end">
<span class="text-[10px] text-slate-500 font-bold uppercase">Current Bar</span>
<span class="text-xl font-black text-primary">92%</span>
</div>
<div class="mt-2 h-1 w-full bg-border-muted rounded-full overflow-hidden">
<div class="h-full bg-primary" style="width: 92%"></div>
</div>
</div>
<div class="bg-surface border border-border-muted p-4 rounded-xl">
<div class="flex justify-between items-end">
<span class="text-[10px] text-slate-500 font-bold uppercase">Session Avg</span>
<span class="text-xl font-black text-white">90%</span>
</div>
<div class="mt-2 h-1 w-full bg-border-muted rounded-full overflow-hidden">
<div class="h-full bg-white/40" style="width: 90%"></div>
</div>
</div>
</div>
<!-- Error Log -->
<div class="space-y-3">
<h4 class="text-[10px] font-black uppercase tracking-widest text-slate-500">Out-of-Scale Log</h4>
<div class="space-y-2">
<div class="flex justify-between items-center p-2 rounded bg-red-500/10 border border-red-500/20">
<span class="font-bold text-red-500">F Natural</span>
<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">4x</span>
</div>
<div class="flex justify-between items-center p-2 rounded bg-red-500/5 border border-red-500/10 opacity-70">
<span class="font-bold text-red-400">C#</span>
<span class="text-xs bg-red-400 text-white px-2 py-0.5 rounded-full font-bold">2x</span>
</div>
</div>
</div>
</aside>
</main>
<!-- Bottom: Scale Guardrail Panel -->
<footer class="bg-surface border-t border-border-muted p-4 flex items-center gap-8">
<div class="flex flex-col gap-1 min-w-[200px]">
<span class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">Selected Guardrail</span>
<div class="flex items-center gap-2">
<span class="text-lg font-black text-primary">G MAJOR</span>
<span class="material-symbols-outlined text-slate-500 text-sm">lock</span>
</div>
</div>
<div class="flex-1 flex gap-2">
<!-- Scale Note Pills -->
<div class="flex-1 bg-background-dark/50 rounded-xl p-2 flex items-center justify-between border border-border-muted/50">
<div class="flex items-center gap-2">
<div class="size-10 rounded-lg bg-primary text-background-dark flex items-center justify-center font-black shadow-[0_0_15px_#38ff14]">G</div>
<div class="size-10 rounded-lg bg-primary/20 text-primary border border-primary/30 flex items-center justify-center font-bold">A</div>
<div class="size-10 rounded-lg bg-primary/20 text-primary border border-primary/30 flex items-center justify-center font-bold">B</div>
<div class="size-10 rounded-lg bg-primary/10 text-white/40 border border-border-muted flex items-center justify-center font-bold">C</div>
<div class="size-10 rounded-lg bg-primary/10 text-white/40 border border-border-muted flex items-center justify-center font-bold">D</div>
<div class="size-10 rounded-lg bg-primary/10 text-white/40 border border-border-muted flex items-center justify-center font-bold">E</div>
<div class="size-10 rounded-lg bg-primary/20 text-primary border border-primary/30 flex items-center justify-center font-bold">F#</div>
</div>
<div class="flex items-center gap-4 px-4">
<div class="flex flex-col items-center">
<span class="text-[8px] text-slate-500 font-bold uppercase">Detected</span>
<div class="size-8 rounded-full border-2 border-red-500 flex items-center justify-center text-red-500 font-black text-sm bg-red-500/10">F</div>
</div>
</div>
</div>
</div>
<div class="flex gap-4">
<div class="flex flex-col items-end">
<span class="text-[10px] text-slate-500 font-bold uppercase">Input Source</span>
<span class="text-sm font-bold text-white flex items-center gap-2">
                    Scarlett 2i2 <span class="size-2 rounded-full bg-primary"></span>
</span>
</div>
</div>
</footer>
</body></html>
